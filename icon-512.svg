<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1f6b42"/>
      <stop offset="100%" stop-color="#0a2218"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c855" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0c855" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce9a0"/>
      <stop offset="50%" stop-color="#f0c855"/>
      <stop offset="100%" stop-color="#c49a38"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fc49b"/>
      <stop offset="100%" stop-color="#34a06a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <!-- Glow -->
  <circle cx="96" cy="96" r="70" fill="url(#glow)"/>
  <!-- Handshake / bond symbol - two hands -->
  <!-- Left hand -->
  <path d="M46 108 C46 108 52 95 62 90 C68 87 74 88 78 92 L90 104" 
        fill="none" stroke="url(#green)" stroke-width="7" stroke-linecap="round"/>
  <!-- Right hand -->
  <path d="M146 108 C146 108 140 95 130 90 C124 87 118 88 114 92 L102 104" 
        fill="none" stroke="url(#green)" stroke-width="7" stroke-linecap="round"/>
  <!-- Center bond/clasp -->
  <ellipse cx="96" cy="106" rx="14" ry="10" fill="url(#gold)" filter="url(#shadow)"/>
  <ellipse cx="96" cy="106" rx="10" ry="7" fill="#0a2218"/>
  <ellipse cx="96" cy="106" rx="6" ry="4" fill="url(#gold)"/>
  <!-- 12 text -->
  <text x="96" y="80" text-anchor="middle" font-family="serif" font-weight="700" 
        font-size="28" fill="url(#gold)" filter="url(#shadow)">১২</text>
  <!-- বন্ধন text -->
  <text x="96" y="148" text-anchor="middle" font-family="serif" font-weight="700" 
        font-size="16" fill="url(#gold)" letter-spacing="1">বন্ধন</text>
  <!-- Decorative dots -->
  <circle cx="40" cy="96" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="152" cy="96" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="96" cy="32" r="3" fill="url(#gold)" opacity="0.5"/>
</svg>